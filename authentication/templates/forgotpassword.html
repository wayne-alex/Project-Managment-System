<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Planr</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full font-sans antialiased text-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 selection:bg-indigo-500 selection:text-white">

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Brand Logo Header -->
        <div class="flex items-center justify-center gap-2 text-indigo-600 font-extrabold text-3xl tracking-tight">
            <i data-lucide="calendar-range" class="w-9 h-9 stroke-[2.5]"></i>
            <span>Planr</span>
        </div>

        <!-- Heading Subtext Context -->
        <h2 class="mt-6 text-center text-xl font-extrabold tracking-tight text-slate-900">
            Recover your account access
        </h2>
        <p class="mt-1.5 text-center text-xs text-slate-500 max-w">
            Provide your authenticated corporate email to intercept a secure password translation ticket.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md px-4">
        <!-- Core Form Card Block Context -->
        <div class="bg-white py-8 px-4 shadow-xl shadow-slate-200/50 rounded-xl border border-slate-200 sm:px-10 space-y-6">

            <!-- Optional Dynamic Alert Frame: Default State Hidden, Un-comment to activate server side feedback -->
            <!--
            <div class="rounded-lg bg-emerald-50 border border-emerald-100 p-3.5 flex items-start gap-3">
                <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-600 shrink-0 mt-0.5"></i>
                <div>
                    <span class="block text-xs font-bold text-emerald-800">Dispatch Checkpoint Complete</span>
                    <p class="mt-0.5 text-[11px] text-emerald-600 leading-normal font-medium">If a matching credential exists inside our isolation block, a recovery token has been transmitted successfully.</p>
                </div>
            </div>
            -->

            <form action="#" method="POST" class="space-y-5">
                <!-- User Email Targeting Parameter Input -->
                <div>
                    <label for="recovery_email" class="block text-xs font-bold uppercase tracking-wider text-slate-500">
                        Registered Email Address
                    </label>
                    <div class="mt-1.5 relative rounded-lg shadow-2xs">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </div>
                        <input id="recovery_email" type="email" name="email" required autocomplete="email"
                            placeholder="you@company.com"
                            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium transition-all">
                    </div>
                </div>

                <!-- Submit Activation Dispatch Trigger Button -->
                <div>
                    <button type="submit"
                        class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all cursor-pointer">
                        <i data-lucide="key-round" class="w-3.5 h-3.5"></i>
                        <span>Transmit Recovery Token</span>
                    </button>
                </div>
            </form>

            <!-- Card Bottom Structural Dividers & Navigation Options -->
            <div class="pt-4 border-t border-slate-100 flex items-center justify-center">
                <a href="#" class="inline-flex items-center gap-1.5 text-xs font-bold text-indigo-600 hover:text-indigo-800 hover:underline transition-all group">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5 group-hover:-translate-x-0.5 transition-transform"></i>
                    <span>Return to account authorization</span>
                </a>
            </div>

        </div>

        <!-- Footnote System Security Compliance Logs -->
        <p class="mt-8 text-center text-[10px] text-slate-400 font-medium select-none tracking-normal">
            Protected by multi-tenant routing encryption systems.<br>
            Need engineering override assistance? <a href="#" class="text-slate-500 font-bold hover:underline">Contact Support</a>
        </p>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
